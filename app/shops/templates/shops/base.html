{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PriceCompare{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'shops/styles.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'dashboard' %}">PriceCompare</a>
    <nav class="site-nav">
      <a href="{% url 'dashboard' %}">Товары</a>
      <a href="/admin/">Админка</a>
    </nav>
  </header>

  <main class="container">
    {% if messages %}
      <section class="messages">
        {% for message in messages %}
          <div class="message message-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </section>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
